<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Private Access ✦</title>
    <style>
        body { background: #0a0a0a; color: #d4a017; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; padding: 40px 20px; }
        #guard { max-width: 450px; margin: 100px auto; border: 1px solid #333; padding: 50px 40px; border-radius: 20px; background: #111; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        h2 { font-weight: 200; letter-spacing: 5px; margin-bottom: 40px; font-size: 1.1rem; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 15px; width: 85%; text-align: center; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #d4a017; box-shadow: 0 0 10px rgba(212,160,23,0.2); }
        button { background: #d4a017; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 25px; width: 93%; letter-spacing: 3px; transition: 0.2s; }
        button:hover { background: #f5c842; transform: scale(1.02); }
        .hidden { display: none; }
        video { width: 100%; max-width: 850px; border-radius: 15px; margin-top: 20px; box-shadow: 0 0 40px rgba(212,160,23,0.1); }
    </style>
</head>
<body>

    <div id="guard">
        <h2>AUTHENTICATION</h2>
        <input type="password" id="p" placeholder="ENTER KEY">
        <br>
        <button onclick="v()">UNLOCK</button>
    </div>

    <div id="content" class="hidden">
        <div id="p-inner"></div>
    </div>

    <script>
        const _k = "a2l0YWdhd2FyaWhv";

        function v() {
            const i = document.getElementById('p').value;
            if (btoa(unescape(encodeURIComponent(i))) === _k) {
                document.getElementById('guard').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('p-inner').innerHTML = `
                    <video controls playsinline>
                        <source src="nana.mp4" type="video/mp4">
                    </video>`;
            } else {
                alert("ACCESS DENIED.");
            }
        }
    </script>
</body>
</html>
