<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #login-container { max-width: 350px; margin: 100px auto; padding: 30px; background: #222; border-radius: 12px; }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; text-align: center; }
        button { width: 98%; padding: 12px; background: #007bff; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        video { width: 100%; max-width: 800px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-container">
            <h2>認証が必要です</h2>
            <input type="password" id="passInput" placeholder="パスワードを入力してください">
            <br>
            <button onclick="checkPass()">確認</button>
        </div>
    </div>

    <div id="video-screen" class="hidden">
        <h1>動画を再生します</h1>
        <div id="player-area"></div>
    </div>

    <script>
        const GOAL = "a2l0YWdhd2FyaWhv";

        function checkPass() {
            const input = document.getElementById('passInput').value;
            let encoded = btoa(unescape(encodeURIComponent(input)));

            if (encoded === GOAL) {
                // 1. 画面を切り替える
                document.getElementById('login-screen').className = 'hidden';
                document.getElementById('video-screen').className = '';
                
                // 2. 認証後に「動画タグ」をゼロから作成して流し込む（これが一番確実）
                document.getElementById('player-area').innerHTML = 
                    '<video id="main-video" controls playsinline autoplay>' +
                    '<source src="nana.mp4" type="video/mp4">' +
                    '</video>';
                
                // 3. 念押しで再生命令
                const v = document.getElementById('main-video');
                v.play().catch(e => {
                    console.log("Auto-play blocked, waiting for user interaction.");
                });
            } else {
                alert("パスワードが正しくありません。");
            }
        }
    </script>
</body>
</html>
