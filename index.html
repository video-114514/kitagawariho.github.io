<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body { 
            background: #111; 
            color: #eee; 
            font-family: "Helvetica Neue", Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        #login-container { 
            max-width: 380px; 
            margin: 120px auto; 
            padding: 35px 20px; 
            background: #1e1e1e; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
        }
        h2 { 
            font-size: 1.1rem; 
            margin-bottom: 25px; 
            color: #ccc;
            font-weight: normal;
        }
        input { 
            width: 85%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #000; 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
            text-align: center;
        }
        button { 
            width: 92%; 
            padding: 12px; 
            background: #007bff; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            transition: 0.2s;
        }
        button:hover {
            background: #0056b3;
        }
        .hidden { display: none; }
        video { 
            width: 100%; 
            max-width: 800px; 
            border-radius: 10px; 
            margin-top: 20px; 
            background: #000; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 1.2rem;
            margin-top: 20px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-container">
            <h2>認証が必要です</h2>
            <input type="password" id="passInput" placeholder="パスワードを入力してください">
            <br>
            <button onclick="checkPass()">確認</button>
        </div>
    </div>

    <div id="video-screen" class="hidden">
        <h1>動画を再生します</h1>
        <video id="main-video" controls playsinline>
            <source src="nana.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // パスワード "kitagawariho" のハッシュ値
        const GOAL = "a2l0YWdhd2FyaWhv";

        function checkPass() {
            const input = document.getElementById('passInput').value;
            let encoded;
            try {
                // 日本語や特殊文字にも対応したBase64変換
                encoded = btoa(unescape(encodeURIComponent(input)));
            } catch (e) {
                encoded = "";
            }

            if (encoded === GOAL) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('video-screen').classList.remove('hidden');
                
                // 動画をロードして再生準備
                const v = document.getElementById('main-video');
                v.load(); 
            } else {
                alert("パスワードが正しくありません。");
                document.getElementById('passInput').value = "";
            }
        }

        // Enterキー入力にも対応
        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPass();
        });
    </script>
</body>
</html>
