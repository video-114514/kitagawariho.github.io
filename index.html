<script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzohWPmdkoBy8kjAbFdYSQTK5NBDz7oWRtjMx0s-8HqiLk4IIsW0-7znwzQ48V8AdMW/exec";
        
        function diagnose() {
            const u = document.getElementById('u-name').value.trim();
            const p = document.getElementById('p-name').value.trim();
            
            if (!u || !p) return alert("お名前を両方入力してください。");
            
            // ★ 新機能：二つの入力欄が同じ名前だったら即弾く
            if (u === p) {
                alert("✦ ご自身と同じ影を結ぶことはできません。星が映し出すのは、異なる二つの魂の共鳴です。 ✦");
                return;
            }
            
            document.getElementById('setup-screen').classList.add('hidden');
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ p1: u, p2: p })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    const res = data.result;
                    let cls = "normal";
                    if (res.includes("100") || res.includes("80") || res.includes("85") || res.includes("90") || res.includes("95")) cls = "good";
                    else if (res.includes("10") || res.includes("15") || res.includes("20") || res.includes("25") || res.includes("30") || res.includes("35")) cls = "bad";
                    const out = document.getElementById('result-output');
                    out.innerText = res; out.className = "result-main " + cls;
                    document.getElementById('result-screen').classList.remove('hidden');
                } else { 
                    // 名字だけ、またはデタラメでAIに弾かれた際のエモいアラート
                    alert("✦ お二人の『姓』と『名』、そのすべてが揃って初めて、星々は未来を紡ぎます。フルネームで正しく綴られていますか？ ✦"); 
                    location.reload(); 
                }
            })
            .catch(err => { 
                alert("通信が途絶えました。星の導きを再接続します。"); 
                location.reload(); 
            });
        }
    </script>
