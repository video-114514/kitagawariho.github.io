<script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzohWPmdkoBy8kjAbFdYSQTK5NBDz7oWRtjMx0s-8HqiLk4IIsW0-7znwzQ48V8AdMW/exec";
        
        function diagnose() {
            const u = document.getElementById('u-name').value.trim();
            const p = document.getElementById('p-name').value.trim();
            const btn = document.getElementById('fortune-btn'); // 占うボタンを取得
            
            if (!u || !p) return alert("お名前を両方入力してください。");
            
            // ★ 同名ブロック
            if (u === p) {
                alert("✦ ご自身と同じ影を結ぶことはできません。星が映し出すのは、異なる二つの魂の共鳴です。 ✦");
                return;
            }
            
            // 【変更点】画面は隠さない！ボタンを「診断中...」にしてくるくるを回す
            const originalBtnText = btn.innerHTML; // 元のボタン文字（「占う」など）を保存
            btn.disabled = true; // 連打防止でボタンを無効化
            // ボタンの中に文字とCSSインラインのくるくる（スピナー）を注入
            btn.innerHTML = `
                <span style="display: inline-flex; align-items: center; gap: 8px;">
                    診断中...
                    <span style="
                        width: 14px; 
                        height: 14px; 
                        border: 2px solid rgba(255,255,255,0.3); 
                        border-top-color: #fff; 
                        border-radius: 50%; 
                        animation: btn-spin 0.8s linear infinite;
                    "></span>
                </span>
                <style>@keyframes btn-spin { to { transform: rotate(360deg); } }</style>
            `;
            
            fetch(GAS_URL, {
                method: "POST", headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ p1: u, p2: p })
            })
            .then(res => res.json())
            .then(data => {
                // 診断が終わったらボタンを元に戻す
                btn.disabled = false;
                btn.innerHTML = originalBtnText;
                
                if (data.status === "success") {
                    const res = data.result;
                    let cls = "normal";
                    if (res.includes("100") || res.includes("80") || res.includes("85") || res.includes("90") || res.includes("95")) cls = "good";
                    else if (res.includes("10") || res.includes("15") || res.includes("20") || res.includes("25") || res.includes("30") || res.includes("35")) cls = "bad";
                    
                    // 結果が出た瞬間にだけ、最初の画面を隠して結果を出す
                    document.getElementById('setup-screen').classList.add('hidden');
                    const out = document.getElementById('result-output');
                    out.innerText = res; out.className = "result-main " + cls;
                    document.getElementById('result-screen').classList.remove('hidden');
                } else { 
                    // AIエラー時
                    alert("✦ お二人の『姓』と『名』、そのすべてが揃って初めて、星々は未来を紡ぎます。フルネームで正しく綴られていますか？ ✦"); 
                }
            })
            .catch(err => { 
                // 通信エラー時もボタンを元に戻す
                btn.disabled = false;
                btn.innerHTML = originalBtnText;
                alert("通信が途絶えました。星の導きを再接続します。"); 
            });
        }
    </script>
