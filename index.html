<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Private Theater ✦</title>
    <style>
        body { background: #0f0f0f; color: #eee; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #login-container { max-width: 400px; margin: 100px auto; padding: 40px 20px; background: #1a1a1a; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #d4a017; font-weight: 300; margin-bottom: 30px; }
        input { width: 80%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 16px; outline: none; }
        button { width: 85%; padding: 12px; background: #d4a017; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        video { width: 100%; max-width: 900px; border-radius: 10px; margin-top: 20px; background: #000; box-shadow: 0 0 20px rgba(212,160,23,0.1); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-container">
            <h2>ENTER KEY</h2>
            <input type="password" id="passInput" placeholder="Enter Key">
            <br>
            <button onclick="checkPass()">UNLOCK</button>
        </div>
    </div>

    <div id="video-screen" class="hidden">
        <h1 style="color:#d4a017; font-weight: 100; letter-spacing: 5px;">AUTHORIZED</h1>
        <video id="main-video" controls playsinline>
            <source src="nana.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        const GOAL = "a2l0YWdhd2FyaWhv";

        function checkPass() {
            const input = document.getElementById('passInput').value;
            let encoded;
            try {
                encoded = btoa(unescape(encodeURIComponent(input)));
            } catch (e) {
                encoded = "";
            }

            if (encoded === GOAL) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('video-screen').classList.remove('hidden');
                
                // 動画を強制リロード
                const v = document.getElementById('main-video');
                v.load(); 
            } else {
                alert("ACCESS DENIED.");
                document.getElementById('passInput').value = "";
            }
        }

        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPass();
        });
    </script>
</body>
</html>
