<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Private Theater ✦</title>
    <style>
        body { background: #0a0a0a; color: #d4a017; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        #login-container { max-width: 400px; margin: 100px auto; padding: 50px 30px; background: #111; border: 1px solid #333; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        h2 { font-weight: 100; letter-spacing: 5px; margin-bottom: 40px; font-size: 1.2rem; text-shadow: 0 0 10px rgba(212, 160, 23, 0.5); }
        input { width: 85%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; outline: none; text-align: center; }
        input:focus { border-color: #d4a017; box-shadow: 0 0 15px rgba(212, 160, 23, 0.3); }
        button { width: 93%; padding: 15px; background: linear-gradient(135deg, #d4a017 0%, #b8860b 100%); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; letter-spacing: 2px; }
        .hidden { display: none; }
        video { width: 100%; max-width: 850px; border-radius: 15px; margin-top: 30px; background: #000; box-shadow: 0 0 40px rgba(0,0,0,1); }
        h1 { font-weight: 100; letter-spacing: 10px; margin-top: 30px; }
        #loading-msg { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-container">
            <h2>AUTHENTICATION</h2>
            <input type="password" id="p" placeholder="パスワードを入力してください">
            <br>
            <button onclick="v()">UNLOCK</button>
        </div>
    </div>

    <div id="video-screen" class="hidden">
        <h1>AUTHORIZED</h1>
        <div id="player"></div>
        <div id="loading-msg">動画が大きい場合、再生開始まで数秒かかることがあります。</div>
    </div>

    <script>
        const _h = "a2l0YWdhd2FyaWhv";

        function v() {
            const i = document.getElementById('p').value;
            let e;
            try {
                e = btoa(unescape(encodeURIComponent(i)));
            } catch (x) {
                e = "";
            }

            if (e === _h) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('video-screen').classList.remove('hidden');
                
                // 読み込み最適化版タグ注入
                // #t=0.1 を付けることで、最初のフレームを強制的に読み込ませる
                document.getElementById('player').innerHTML = `
                    <video id="v-main" controls playsinline preload="metadata">
                        <source src="nana.mp4#t=0.1" type="video/mp4">
                    </video>`;
                
                const vid = document.getElementById('v-main');
                // スマホのバッテリー制限等で止まらないよう明示的にロード
                vid.load();
            } else {
                alert("パスワードが正しくありません。");
                document.getElementById('p').value = "";
            }
        }

        document.getElementById('p').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') v();
        });
    </script>
</body>
</html>
