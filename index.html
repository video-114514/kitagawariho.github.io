<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Video Library</title>

    <style>
        body {
            background: #111;
            color: #eee;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .video-container {
            max-width: 900px;
            margin: 0 auto 60px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        video {
            width: 100%;
            border-radius: 8px;
            outline: none;
            background: #000;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 50px;
            color: #fff;
        }

        .video-title {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #aaa;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            display: inline-block;
        }

        /* スマホ対応 */
        @media (max-width: 600px) {
            body { padding: 20px 10px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>

<body>

    <h1>✦ MY EXCLUSIVE CONTENT ✦</h1>

    <div class="video-container">
        <video controls playsinline poster="">
            <source src="%E3%81%AA%E3%81%AA.mp4" type="video/mp4">
            <source src="nana.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="video-title">Project: 72quan-ji</div>
    </div>

    <p style="color: #444; font-size: 0.8rem;">&copy; 2026 Private Scripting Lab.</p>

</body>
</html>
